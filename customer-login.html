
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Customer Login</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(180deg,#03543f,#01261d)}
.login-box{width:360px;padding:35px;border-radius:18px;background:rgba(0,0,0,.25);backdrop-filter:blur(12px);box-shadow:0 20px 50px rgba(0,0,0,.4);color:#fff}
h2{text-align:center;margin-bottom:20px}
input[type=text],input[type=password]{width:100%;padding:12px;margin:10px 0;border-radius:10px;border:1px solid #555;background:#ffffff12;color:#fff}
button{width:100%;padding:12px;border:none;border-radius:10px;background:#ff2d3f;color:#fff;font-weight:bold;cursor:pointer}
.row{display:flex;align-items:center;gap:6px;margin:8px 0 15px}
#msg{margin-top:12px;font-size:13px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:s .8s linear infinite;vertical-align:middle}
@keyframes s{to{transform:rotate(360deg)}}
small{display:block;text-align:center;margin-top:16px;color:#ddd}
</style>
</head>
<body>
<div class="login-box">
<h2>Customer Login</h2>

<input id="username" type="text" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<div class="row">
<label><input id="rememberMe" type="checkbox"> Remember Me</label>
</div>

<button id="loginBtn" onclick="login()"><span id="btnText">Login</span></button>

<div id="msg"></div>
<small>BD Secure NetSpeed System</small>
</div>

<script>
const API_URL="PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";

if(!localStorage.getItem("deviceToken")){
 localStorage.setItem("deviceToken",Date.now()+"-"+Math.random().toString(36).substr(2,9));
}

window.onload=()=>{
 const u=localStorage.getItem("savedUsername");
 const p=localStorage.getItem("savedPassword");
 if(u&&p){
   username.value=u;
   password.value=p;
   rememberMe.checked=true;
 }
};

async function login(){
 const username=document.getElementById("username").value.trim();
 const password=document.getElementById("password").value.trim();
 const msg=document.getElementById("msg");
 const btn=document.getElementById("loginBtn");
 const txt=document.getElementById("btnText");

 if(!username||!password){
   msg.style.color="#ff6666";
   msg.textContent="Fill all fields";
   return;
 }

 if(rememberMe.checked){
   localStorage.setItem("savedUsername",username);
   localStorage.setItem("savedPassword",password);
 }else{
   localStorage.removeItem("savedUsername");
   localStorage.removeItem("savedPassword");
 }

 btn.disabled=true;
 txt.innerHTML='<span class="spinner"></span> Loading...';

 try{
   const r=await fetch(API_URL,{
     method:"POST",
     body:JSON.stringify({
       action:"login",
       username,
       password,
       deviceToken:localStorage.getItem("deviceToken"),
       deviceName:navigator.userAgent
     })
   });
   const res=await r.json();

   if(res.status==="success"){
      localStorage.setItem("auth","true");
      localStorage.setItem("username",res.username);
      localStorage.setItem("role",res.role);
      msg.style.color="#00ff99";
      msg.textContent="Login Success";
      setTimeout(()=>{
        location.href=(res.role==="chat")?"chat.html":"customer-dashboard.html";
      },800);
   }else{
      msg.style.color="#ff6666";
      msg.textContent=res.message||"Login Failed";
   }
 }catch(e){
   msg.style.color="#ff6666";
   msg.textContent="Server Error";
 }finally{
   btn.disabled=false;
   txt.textContent="Login";
 }
}

document.addEventListener("keydown",e=>{
 if(e.key==="Enter") login();
});
</script>
</body>
</html>
