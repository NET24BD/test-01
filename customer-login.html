<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(180deg,#03543f,#01261d);
}

/* LOGIN BOX */
.login-box{
    width:360px;
    padding:35px;
    border-radius:18px;
    background:rgba(0,0,0,0.25);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(12px);
    position:relative;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,0.4);
}

/* RED CIRCLE TOP RIGHT */
.login-box::before{
    content:"";
    width:85px;
    height:85px;
    background:#ff2d3f;
    border-radius:50%;
    position:absolute;
    top:20px;
    right:20px;
    box-shadow:0 0 25px rgba(255,45,63,0.4);
}

h2{
    color:white;
    margin-bottom:25px;
    font-size:22px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.08);
    color:white;
    outline:none;
    transition:0.3s;
}

input:focus{
    border-color:#ff2d3f;
    box-shadow:0 0 10px rgba(255,45,63,0.3);
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#ff2d3f;
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
    background:#ff1b2e;
}

/* FOOTER TEXT */
small{
    display:block;
    margin-top:15px;
    color:#cbd5e1;
    font-size:12px;
}
</style>
</head>

<body>

<div class="login-box">

    <h2>Customer Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <small>BD Secure NetSpeed Bangladesh System</small>

    <div id="msg" style="color:#fff;margin-top:10px;font-size:13px;"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyZlOQVK2pehzbZB3BRF2Z4tFvrINnCnkCUFARFop2vfWF_C7gUbJuoOfVgFT2nFXDA/exec";

function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    if(!username || !password){
        msg.innerText = "Fill all fields";
        return;
    }

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"login",
            username,
            password
        })
    })
    .then(res=>res.json())
    .then(res=>{

        if(res.status==="success"){

            localStorage.setItem("auth","true");
            localStorage.setItem("username",res.username);
            localStorage.setItem("role",res.role);

            msg.style.color="#00ff99";
            msg.innerText="Login Success ✔";

            setTimeout(()=>{

                if(res.role==="customer"){
                    window.location.href="customer-dashboard.html";
                }
                else if(res.role==="chat"){
                    window.location.href="chat.html";
                }

            },1000);

        }else{
            msg.style.color="#ff4d4d";
            msg.innerText=res.message;
        }

    });

}

</script>

</body>
</html>
