<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#006a4e,#0b3d2e);
    color:white;
}

.wrapper{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOGIN BOX */
.box{
    width:340px;
    background:rgba(0,0,0,0.25);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;
    padding:40px;
    text-align:center;
    backdrop-filter:blur(10px);
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
    position:relative;
}

/* BANGLADESH FLAG DOT */
.box::before{
    content:"";
    width:80px;
    height:80px;
    background:#f42a41;
    border-radius:50%;
    position:absolute;
    top:20px;
    right:20px;
    box-shadow:0 0 30px rgba(244,42,65,0.5);
}

h2{
    margin-bottom:25px;
    font-size:26px;
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:white;
    border:1px solid rgba(255,255,255,0.15);
}

input::placeholder{
    color:#d1d5db;
}

/* BUTTON */
button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f42a41;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:10px;
}

button:hover{
    background:#ff3b55;
}

/* SPINNER */
.spinner{
    width:16px;
    height:16px;
    border:2px solid #fff;
    border-top:2px solid transparent;
    border-radius:50%;
    animation:spin 0.8s linear infinite;
    display:none;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

/* MESSAGE */
#msg{
    margin-top:15px;
    font-size:14px;
    text-align:center;
    color:#d1d5db;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="box">
    <h2>Customer Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button id="loginBtn" onclick="login()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Login</span>
    </button>

    <div id="msg"></div>
</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyZlOQVK2pehzbZB3BRF2Z4tFvrINnCnkCUFARFop2vfWF_C7gUbJuoOfVgFT2nFXDA/exec";

function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let msg = document.getElementById("msg");
    let btn = document.getElementById("loginBtn");
    let spinner = document.getElementById("spinner");
    let btnText = document.getElementById("btnText");

    if(!username || !password){
        msg.style.color = "#f42a41";
        msg.innerText = "Fill all fields";
        return;
    }

    // LOADING START
    btn.disabled = true;
    spinner.style.display = "block";
    btnText.innerText = "Logging in...";
    msg.style.color = "#d1d5db";
    msg.innerText = "Checking credentials...";

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "login",
            username: username,
            password: password
        })
    })
    .then(res => res.json())
    .then(res => {

        if(res.status === "success"){

            localStorage.setItem("username", res.username);
            localStorage.setItem("page", res.page);

            msg.style.color = "#22c55e";
            msg.innerText = "Login successful ✔ Redirecting...";

            // 🔥 DIRECT DASHBOARD REDIRECT
            setTimeout(() => {
                window.location.href = res.page;
            }, 1000);

        }
        else{
            msg.style.color = "#f42a41";
            msg.innerText = res.message;
        }

    })
    .catch(err => {
        msg.style.color = "#facc15";
        msg.innerText = "Server error!";
    })
    .finally(() => {
        btn.disabled = false;
        spinner.style.display = "none";
        btnText.innerText = "Login";
    });

}

</script>

</body>
</html>
