<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineLogin BD - Customer Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
    background: radial-gradient(circle at center, #2e0507 0%, #004d38 50%, #00261c 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.login-container {
    background: rgba(0, 38, 28, 0.75);
    backdrop-filter: blur(25px);
    padding: 35px;
    border-radius: 25px;
    width: 100%;
    max-width: 420px;
    text-align: center;
    border: 1px solid rgba(244, 63, 94, 0.3);
}

h2 { color: #fff; margin-bottom: 10px; }

p { color: #aaa; margin-bottom: 20px; }

.input-group {
    position: relative;
    margin-bottom: 15px;
}

input {
    width: 100%;
    padding: 14px 40px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.05);
    color: white;
}

i.left {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
}

.toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: #aaa;
}

button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #e11d48, #b91c1c);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

.error-box {
    display: none;
    background: rgba(255,0,0,0.1);
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    color: #ff8a8a;
}

#loadingBox{
    display:none;
    margin-top:10px;
    color:#fff;
    font-size:14px;
}
</style>
</head>

<body>

<div class="login-container">

    <h2>সিনে-কাস্টমার লগইন</h2>
    <p>আপনার অ্যাকাউন্টে প্রবেশ করুন</p>

    <form id="loginForm">

        <div class="input-group">
            <i class="fas fa-user left"></i>
            <input type="text" id="username" placeholder="Username" required>
        </div>

        <div class="input-group">
            <i class="fas fa-lock left"></i>
            <input type="password" id="password" placeholder="Password" required>
            <i class="fas fa-eye toggle-password" id="eyeIcon"></i>
        </div>

        <button type="submit">Login</button>

        <div id="loadingBox">⏳ Logging in...</div>

        <div class="error-box" id="errorBox">
            <span id="errorText"></span>
        </div>

    </form>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyvOzBF0NhMDksSyLuU5iV9kUjNyN59LMY3umBUfjyfCAUgRG_HNt4AjzDp1PJLQJ5P/exec";

/* Device ID */
function getDeviceId() {
    let id = localStorage.getItem("deviceId");
    if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem("deviceId", id);
    }
    return id;
}

/* Password toggle */
const password = document.getElementById("password");
const eyeIcon = document.getElementById("eyeIcon");

eyeIcon.addEventListener("click", () => {
    if(password.type === "password"){
        password.type = "text";
        eyeIcon.className = "fas fa-eye-slash toggle-password";
    } else {
        password.type = "password";
        eyeIcon.className = "fas fa-eye toggle-password";
    }
});

/* LOGIN */
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();

    const username = document.getElementById("username").value;
    const passwordVal = document.getElementById("password").value;

    const errorBox = document.getElementById("errorBox");
    const errorText = document.getElementById("errorText");
    const loadingBox = document.getElementById("loadingBox");

    errorBox.style.display = "none";
    loadingBox.style.display = "block";

    try {
        const res = await fetch(API_URL, {
            method: "POST",
            headers: {
                "Content-Type": "text/plain;charset=utf-8"
            },
            body: JSON.stringify({
                action:"login",
                username,
                password: passwordVal,
                deviceId: getDeviceId()
            })
        });

        const data = await res.json();

        loadingBox.style.display = "none";

        if(data.status === "success"){

            // 🔥 FIX: AUTH SET
            localStorage.setItem("auth", "true");
            localStorage.setItem("user", username);

            window.location.replace("customer-dashboard.html");

        } else {
            errorText.innerText = data.message;
            errorBox.style.display = "block";
        }

    } catch(err){
        loadingBox.style.display = "none";
        errorText.innerText = "Server error!";
        errorBox.style.display = "block";
    }
});
</script>

</body>
</html>
