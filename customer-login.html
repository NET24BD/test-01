<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>
</head>
<body>

<h2>Customer Login</h2>

<input id="username" type="text" placeholder="Username"><br><br>

<input id="password" type="password" placeholder="Password"><br><br>

<label>
    <input id="rememberMe" type="checkbox">
    Remember Me
</label>

<br><br>

<button id="loginBtn" onclick="login()">
    <span id="btnText">Login</span>
</button>

<div id="msg"></div>

<script>
const API_URL="https://script.google.com/macros/s/AKfycbyZlOQVK2pehzbZB3BRF2Z4tFvrINnCnkCUFARFop2vfWF_C7gUbJuoOfVgFT2nFXDA/exec";

if(!localStorage.getItem("deviceToken")){
 localStorage.setItem("deviceToken",Date.now()+"-"+Math.random().toString(36).substr(2,9));
}

window.onload=()=>{
 const u=localStorage.getItem("savedUsername");
 const p=localStorage.getItem("savedPassword");
 if(u&&p){
   username.value=u;
   password.value=p;
   rememberMe.checked=true;
 }
};

async function login(){
 const username=document.getElementById("username").value.trim();
 const password=document.getElementById("password").value.trim();
 const msg=document.getElementById("msg");
 const btn=document.getElementById("loginBtn");
 const txt=document.getElementById("btnText");

 if(!username||!password){
   msg.style.color="red";
   msg.textContent="Fill all fields";
   return;
 }

 if(rememberMe.checked){
   localStorage.setItem("savedUsername",username);
   localStorage.setItem("savedPassword",password);
 }else{
   localStorage.removeItem("savedUsername");
   localStorage.removeItem("savedPassword");
 }

 btn.disabled=true;
 txt.textContent="Loading...";

 try{
   const r=await fetch(API_URL,{
     method:"POST",
     body:JSON.stringify({
       action:"login",
       username,
       password,
       deviceToken:localStorage.getItem("deviceToken"),
       deviceName:navigator.userAgent
     })
   });

   const res=await r.json();

   if(res.status==="success"){
      localStorage.setItem("auth","true");
      localStorage.setItem("username",res.username);
      localStorage.setItem("role",res.role);

      msg.style.color="green";
      msg.textContent="Login Success";

      setTimeout(()=>{
        location.href=(res.role==="chat")
          ? "chat.html"
          : "customer-dashboard.html";
      },800);

   }else{
      msg.style.color="red";
      msg.textContent=res.message || "Login Failed";
   }

 }catch(e){
   msg.style.color="red";
   msg.textContent="Server Error";
 }finally{
   btn.disabled=false;
   txt.textContent="Login";
 }
}

document.addEventListener("keydown",e=>{
 if(e.key==="Enter") login();
});
</script>

</body>
</html>
