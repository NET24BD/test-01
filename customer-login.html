<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#006a4e,#0b3d2e);
    color:white;
}

/* CENTER */
.wrapper{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* LOGIN BOX */
.box{
    width:340px;
    background:rgba(0,0,0,0.25);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;
    padding:40px;
    text-align:center;
    backdrop-filter:blur(10px);
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
    position:relative;
}

/* BANGLADESH FLAG DOT */
.box::before{
    content:"";
    width:80px;
    height:80px;
    background:#f42a41;
    border-radius:50%;
    position:absolute;
    top:20px;
    right:20px;
    box-shadow:0 0 30px rgba(244,42,65,0.5);
}

h2{
    font-size:26px;
    margin-bottom:25px;
    font-weight:800;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    outline:none;
    background:rgba(255,255,255,0.08);
    color:white;
    border:1px solid rgba(255,255,255,0.15);
}

input::placeholder{
    color:#d1d5db;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#f42a41;
    color:white;
    font-weight:bold;
    cursor:pointer;
    margin-top:15px;
    transition:0.3s;
}

button:hover{
    background:#ff3b55;
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(244,42,65,0.4);
}

small{
    display:block;
    margin-top:15px;
    color:#d1d5db;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="box">
        <h2>Customer Login</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <small>🇧🇩 Secure NetSpeed Bangladesh System</small>
    </div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyZlOQVK2pehzbZB3BRF2Z4tFvrINnCnkCUFARFop2vfWF_C7gUbJuoOfVgFT2nFXDA/exec";

function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    if(!username || !password){
        alert("Fill all fields");
        return;
    }

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: "login",
            username: username,
            password: password
        })
    })
    .then(res => res.json())
    .then(res => {

        if(res.status === "success"){
            localStorage.setItem("username", res.username);
            localStorage.setItem("page", res.page);

            window.location.href = res.page;
        }
        else{
            alert(res.message);
        }

    });

}

</script>

</body>
</html>
