<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Login</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#006a4e,#0b3d2e);
    color:white;
}

.wrapper{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    width:340px;
    background:rgba(0,0,0,0.35);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:18px;
    padding:40px;
    text-align:center;
    backdrop-filter:blur(10px);
    box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

h2{
    color:#00e676;
    margin-bottom:20px;
}

/* 🌈 INPUT STYLE */
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border-radius:12px;
    border:2px solid transparent;
    background:
        linear-gradient(#0e241b,#0e241b) padding-box,
        linear-gradient(135deg,#ff1744,#00e676) border-box;
    color:white;
    outline:none;
    transition:0.3s;
}

input:focus{
    transform:scale(1.03);
    box-shadow:0 0 12px rgba(0,255,100,0.3);
}

/* BUTTON */
button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#ff1744,#00e676);
    color:white;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

#msg{
    margin-top:15px;
    font-size:14px;
}
</style>
</head>

<body>

<div class="wrapper">
<div class="box">

<h2>Customer Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<div id="msg"></div>

</div>
</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyZlOQVK2pehzbZB3BRF2Z4tFvrINnCnkCUFARFop2vfWF_C7gUbJuoOfVgFT2nFXDA/exec";

function login(){

    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;
    let msg = document.getElementById("msg");

    if(!username || !password){
        msg.innerText = "Fill all fields";
        return;
    }

    fetch(API_URL,{
        method:"POST",
        body:JSON.stringify({
            action:"login",
            username,
            password
        })
    })
    .then(res=>res.json())
    .then(res=>{

        if(res.status === "success"){

            localStorage.setItem("auth","true");
            localStorage.setItem("username",res.username);
            localStorage.setItem("role",res.role);

            msg.style.color="#00e676";
            msg.innerText="Login Success ✔";

            setTimeout(()=>{

                if(res.role === "customer"){
                    window.location.href="customer-dashboard.html";
                }
                else if(res.role === "chat"){
                    window.location.href="chat.html";
                }

            },1000);

        }
        else{
            msg.style.color="#ff1744";
            msg.innerText=res.message;
        }

    });

}
</script>

</body>
</html>
